name: Build & Release

on:
  push:
    branches: [main]
  release:
    types: [published, edited]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach installer to (e.g. v1.1.0)'
        required: true
        default: 'v1.1.0'

jobs:
  build:
    name: Build installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Install Casterlabs SDK into local Maven repo
        run: mvn install:install-file "-Dfile=libs/plugin_sdk-1.2.jar" "-DgroupId=co.casterlabs.caffeinated" "-DartifactId=plugin_sdk" "-Dversion=1.2" "-Dpackaging=jar" "-DgeneratePom=true"
        shell: pwsh

      - name: Build plugin JAR
        run: mvn clean package -B
        shell: pwsh

      - name: Copy JAR to installer directory
        run: Copy-Item target\chatincluded-1.1.0.jar chatincluded-1.1.0.jar -Force
        shell: pwsh

      - name: Install NSIS and build installer
        run: |
          choco install nsis --no-progress -y
          $env:Path += ";C:\Program Files (x86)\NSIS"
          makensis ChatIncludedInstaller.nsi
        shell: pwsh

      - name: Upload unsigned installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChatIncluded-Setup-unsigned
          path: ChatIncluded-Setup.exe
          retention-days: 7

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: ChatIncluded-Setup-unsigned

      - name: Upload installer to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: ChatIncluded-Setup.exe
