<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>ChatIncluded Pixies</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:transparent; }
    canvas {
      position:fixed; inset:0;
      width:100%; height:100%;
      display:block;
    }
    /* demo-mode checkerboard so it's visibly non-blank in the preview panel */
    body.demo-mode {
      background:
        repeating-conic-gradient(#1a1a2e 0% 25%, #0e0e18 0% 50%)
        0 0 / 32px 32px;
    }
    .demo-label {
      position:fixed; top:10px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.55); border:1px solid rgba(167,139,250,0.35);
      border-radius:20px; padding:4px 16px;
      color:#a78bfa; font-size:13px; font-weight:800;
      font-family:'Nunito',sans-serif; pointer-events:none; white-space:nowrap;
    }
  </style>
</head>
<body>
<canvas id="stage"></canvas>
<script src="pixie-shared.js"></script>
<script>
var engine = null;
var _disabledPixies = [];

function _loadDisabledPixies() {
    var raw = null;
    try { raw = Widget.getSetting('appearance.disabledPixies'); } catch(e) {}
    if (!raw) { try { raw = localStorage.getItem('ci_disabledPixies'); } catch(e) {} }
    try { _disabledPixies = JSON.parse(raw || '[]'); } catch(e) { _disabledPixies = []; }
    if (engine) engine.disabledPixies = _disabledPixies;
}

function readSettings() {
    return {
        hueShift:        Widget.getSetting('appearance.hueShift') !== false,
        showPlatformIcon:!!Widget.getSetting('appearance.showPlatformIcon'),
        pixieScale:     Number(Widget.getSetting('appearance.pixieScale'))  || 3,
        walkSpeedMin:    Number(Widget.getSetting('movement.walkSpeedMin'))   || 0.03,
        walkSpeedMax:    Number(Widget.getSetting('movement.walkSpeedMax'))   || 0.07,
        maxPixies:       Number(Widget.getSetting('movement.maxPixies'))      || 40,
        inactivityMs:    Number(Widget.getSetting('timing.inactivityMs'))     || 90000,
        customPixies:    (function(){ var v = null; try { v = Widget.getSetting('appearance.customPixies'); } catch(e) {} if (!v || v === '[]') { try { v = localStorage.getItem('ci_customPixies'); } catch(e) {} } return v || '[]'; })(),
        streamerUserId:  Widget.getSetting('streamer.userId')                 || '',
    };
}

function initOverlay(settings) {
    var canvas = document.getElementById('stage');
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    window.addEventListener('resize', function() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
    });
    engine = new PixieEngine(canvas, settings);
    engine.start();
}

// ── Caffeinated SDK path ──────────────────────────────────────────────────
if (typeof Widget !== 'undefined') {
    Widget.on('init', function() {
        // Detect streamer from Koi user state and persist it
        var state = Koi.userStates && Koi.userStates['KoiChatter.CLIENT'];
        var streamerId = state && (state.channelId || state.upid || state.id);
        if (streamerId) {
            Widget.setSetting('streamer.userId', streamerId);
            Widget.emit('streamer_detected', { userId: streamerId });
        }
        var s = readSettings();
        loadCustomPixies(s.customPixies);
        initOverlay(s);
        _loadDisabledPixies();
        engine.customRequestCallback = function(userId, displayName, url) {
            Widget.emit('pixie_request', { userId: userId, username: displayName, url: url });
        };
    });
    Widget.on('update', function() {
        var s = readSettings();
        loadCustomPixies(s.customPixies);
        if (engine) engine.updateSettings(s);
    });
    Widget.on('pixie_approved', function(data) {
        if (!engine || !data) return;
        if (data.url) {
            engine.applyCustomPixie(data.userId, data.url);
        } else if (data.pixie) {
            engine.pixiePrefs[data.userId] = data.pixie;
            if (engine.pixies[data.userId]) engine.pixies[data.userId].pixieType = data.pixie;
        }
    });
    Widget.on('pixie_remove', function(data) {
        if (!engine || !data || !data.userId) return;
        delete engine.pixies[data.userId];
    });
    Widget.on('disabledPixies_update', function(data) {
        var json = typeof data === 'string' ? data : JSON.stringify(data || []);
        try { _disabledPixies = JSON.parse(json); } catch(e) { _disabledPixies = []; }
        if (engine) engine.disabledPixies = _disabledPixies;
        try { localStorage.setItem('ci_disabledPixies', json); } catch(e) {}
        try { Widget.setSetting('appearance.disabledPixies', json); } catch(e) {}
    });
    Widget.on('customPixies_update', function(data) {
        // Java bridge may deserialize the JSON string into an array — handle both
        var json = typeof data === 'string' ? data : JSON.stringify(data || []);
        loadCustomPixies(json);
        try { localStorage.setItem('ci_customPixies', json); } catch(e) {}
        try { Widget.setSetting('appearance.customPixies', json); } catch(e) {}
    });
    Koi.on('RICH_MESSAGE', function(event) { if (engine) engine.handleChatMessage(event); });
    // Broadcast active pixie state to config panel every 2 seconds
    setInterval(function() {
        if (!engine) return;
        var active = Object.keys(engine.pixies).map(function(uid) {
            var p = engine.pixies[uid];
            return { userId: uid, displayName: p.displayName, pixieType: p.pixieType, platform: p.platform };
        });
        try { Widget.emit('pixie_state', { pixies: active }); } catch(e) {}
    }, 2000);
} else {
    // ── Demo / preview mode ───────────────────────────────────────────────
    document.body.classList.add('demo-mode');
    var lbl = document.createElement('div');
    lbl.className = 'demo-label';
    lbl.textContent = '✨ ChatIncluded Pixies — preview (not connected to Caffeinated)';
    document.body.appendChild(lbl);

    var DEMO_NAMES    = ['Kira_Lovey','StarDust99','NeonFoxxy','KickViewer','GhostChatter','RoboChan'];
    var DEMO_MESSAGES = ['Hello chat!','PogChamp','Let\'s gooo!','gg wp','!pixie cat','Hype hype hype'];
    var demoSettings  = { hueShift:true, showPlatformIcon:false, pixieScale:3,
                          walkSpeedMin:0.03, walkSpeedMax:0.07, maxPixies:40,
                          inactivityMs:900000 };

    initOverlay(demoSettings);

    // spawn one demo pixie per pixie type, staggered
    PIXIE_NAMES.forEach(function(type, i) {
        setTimeout(function() {
            var uid = 'demo_' + type;
            engine.pixiePrefs[uid] = type;
            engine.handleChatMessage({
                sender: { channelId: uid, displayname: DEMO_NAMES[i % DEMO_NAMES.length], platform: 'TWITCH' },
                fragments: [{ type:'TEXT', raw: DEMO_MESSAGES[i % DEMO_MESSAGES.length] }]
            });
        }, i * 800);
    });


}
</script>
</body>
</html>
